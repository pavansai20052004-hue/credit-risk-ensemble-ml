services:
  - type: web
    name: credisense-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python init_db.py
    startCommand: gunicorn app:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_PHONE
        sync: false
